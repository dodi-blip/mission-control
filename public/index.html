<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control - Drizzy Ops</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      color: #e1e8f0;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #2d3748;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    button.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .timestamp {
      font-size: 12px;
      color: #a0aec0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: #3b82f6;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.1);
    }

    .card h2 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #60a5fa;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-badge {
      display: inline-block;
      background: #3b82f6;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-left: auto;
    }

    .task-list {
      list-style: none;
    }

    .task-item {
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(15, 23, 42, 0.6);
      border-left: 3px solid #3b82f6;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.5;
    }

    .task-item.completed {
      border-left-color: #10b981;
      opacity: 0.8;
      text-decoration: line-through;
      color: #94a3b8;
    }

    .task-item.urgent {
      border-left-color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    .task-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .task-meta {
      font-size: 12px;
      color: #94a3b8;
    }

    .health-summary {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .health-stat {
      text-align: center;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: #60a5fa;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .empty-state {
      text-align: center;
      padding: 30px;
      color: #94a3b8;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #3b82f6;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #60a5fa;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ Mission Control</h1>
      <div class="controls">
        <button id="refreshBtn" onclick="refresh()">↻ Refresh</button>
        <div class="timestamp" id="timestamp">Loading...</div>
      </div>
    </header>

    <div id="error" class="error" style="display: none;"></div>

    <div class="health-summary" id="healthSummary" style="display: none;">
      <div class="health-stat">
        <div class="stat-value" id="loadValue">0</div>
        <div class="stat-label">Current Load</div>
      </div>
      <div class="health-stat">
        <div class="stat-value" id="blockerValue">0</div>
        <div class="stat-label">Blockers</div>
      </div>
      <div class="health-stat">
        <div class="stat-value" id="completedValue">0</div>
        <div class="stat-label">This Week</div>
      </div>
      <div class="health-stat">
        <div class="stat-value" id="queueValue">0</div>
        <div class="stat-label">In Queue</div>
      </div>
    </div>

    <div class="grid" id="dashboard" style="margin-top: 30px;">
      <div class="card">
        <div class="loading">
          <div class="spinner"></div>
          Loading dashboard...
        </div>
      </div>
    </div>
  </div>

  <script>
    async function refresh() {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('loading');
      btn.textContent = '⟳';

      try {
        const res = await fetch('/api/refresh');
        const data = await res.json();
        renderDashboard(data);
        updateTimestamp(data.timestamp);
        document.getElementById('error').style.display = 'none';
      } catch (e) {
        console.error('Refresh error:', e);
        document.getElementById('error').textContent = 'Failed to refresh. Check your connection.';
        document.getElementById('error').style.display = 'block';
      } finally {
        btn.classList.remove('loading');
        btn.textContent = '↻ Refresh';
      }
    }

    function renderDashboard(data) {
      const tasks = data.tasks || {};
      const dashboard = document.getElementById('dashboard');
      const health = document.getElementById('healthSummary');

      // Update health summary
      document.getElementById('loadValue').textContent = tasks.health?.load || 0;
      document.getElementById('blockerValue').textContent = tasks.health?.blockers?.length || 0;
      document.getElementById('completedValue').textContent = tasks.completed?.length || 0;
      document.getElementById('queueValue').textContent = tasks.queue?.length || 0;
      health.style.display = 'grid';

      // Render cards
      dashboard.innerHTML = '';

      // Current Work
      const currentCard = createCard(
        '🚀 Current Work',
        tasks.current || [],
        false
      );
      dashboard.appendChild(currentCard);

      // Task Queue
      const queueCard = createCard(
        '📋 Task Queue',
        tasks.queue || [],
        false
      );
      dashboard.appendChild(queueCard);

      // Waiting on Dodi
      const waitingCard = createCard(
        '⏳ Waiting on Dodi',
        tasks.waitingOnDodi || [],
        false
      );
      dashboard.appendChild(waitingCard);

      // Recent Completions
      const completedCard = createCard(
        '✅ Recent Completions',
        tasks.completed || [],
        true
      );
      dashboard.appendChild(completedCard);

      // Blockers
      const blockersCard = createCard(
        '🔴 Blockers',
        tasks.health?.blockers || [],
        false
      );
      dashboard.appendChild(blockersCard);
    }

    function createCard(title, items, isCompleted) {
      const card = document.createElement('div');
      card.className = 'card';

      const header = document.createElement('h2');
      header.textContent = title;
      const badge = document.createElement('span');
      badge.className = 'card-badge';
      badge.textContent = items.length;
      header.appendChild(badge);

      card.appendChild(header);

      if (!items || items.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'No items';
        card.appendChild(empty);
      } else {
        const list = document.createElement('ul');
        list.className = 'task-list';

        items.slice(0, 8).forEach(task => {
          const item = document.createElement('li');
          item.className = 'task-item';
          if (isCompleted) item.classList.add('completed');
          if (task.priority?.priority === 'urgent') item.classList.add('urgent');

          const name = document.createElement('div');
          name.className = 'task-name';
          name.textContent = task.name || 'Untitled';

          const meta = document.createElement('div');
          meta.className = 'task-meta';
          meta.textContent = task.status?.status || 'No status';

          item.appendChild(name);
          item.appendChild(meta);
          list.appendChild(item);
        });

        card.appendChild(list);
      }

      return card;
    }

    function updateTimestamp(iso) {
      const ts = document.getElementById('timestamp');
      if (iso) {
        const date = new Date(iso);
        ts.textContent = date.toLocaleTimeString();
      }
    }

    // Load on page load
    refresh();

    // Auto-refresh every 5 minutes
    setInterval(refresh, 5 * 60 * 1000);
  </script>
</body>
</html>
